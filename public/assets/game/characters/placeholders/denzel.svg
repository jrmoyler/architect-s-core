<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="bg-d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1A2E"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="64" height="64" fill="url(#bg-d)"/>
  <!-- cyan border -->
  <rect x="1" y="1" width="62" height="62" fill="none" stroke="#00E5FF" stroke-width="2" rx="3"/>
  <!-- head -->
  <rect x="22" y="7" width="20" height="16" rx="2" fill="#1A3040"/>
  <rect x="24" y="9" width="16" height="12" fill="#8B5E3C"/>
  <!-- eyes -->
  <rect x="27" y="13" width="3" height="3" fill="#00E5FF"/>
  <rect x="34" y="13" width="3" height="3" fill="#00E5FF"/>
  <!-- body / suit -->
  <rect x="16" y="25" width="32" height="22" rx="2" fill="#0E1E30"/>
  <rect x="16" y="25" width="32" height="22" fill="none" stroke="#00E5FF" stroke-width="1" rx="2"/>
  <!-- tie -->
  <polygon points="32,25 29,37 32,39 35,37" fill="#C9A227"/>
  <!-- lapels -->
  <polygon points="30,25 20,33 28,33" fill="#152A40"/>
  <polygon points="34,25 44,33 36,33" fill="#152A40"/>
  <!-- broadcast arcs left -->
  <path d="M9 30 a10 10 0 0 0 0 14" fill="none" stroke="#C9A227" stroke-width="2" stroke-linecap="round"/>
  <path d="M5 26 a16 16 0 0 0 0 20" fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <!-- broadcast arcs right -->
  <path d="M55 30 a10 10 0 0 1 0 14" fill="none" stroke="#C9A227" stroke-width="2" stroke-linecap="round"/>
  <path d="M59 26 a16 16 0 0 1 0 20" fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <!-- legs -->
  <rect x="19" y="49" width="11" height="12" rx="1" fill="#0B1520"/>
  <rect x="34" y="49" width="11" height="12" rx="1" fill="#0B1520"/>
  <!-- shoe trim -->
  <rect x="19" y="59" width="11" height="2" fill="#00E5FF"/>
  <rect x="34" y="59" width="11" height="2" fill="#00E5FF"/>
  <!-- role glyph top-right -->
  <text x="59" y="11" text-anchor="middle" font-family="monospace" font-size="8" fill="#C9A227">◈</text>
</svg>
