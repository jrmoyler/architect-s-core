<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="bg-as" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0820"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </linearGradient>
    <linearGradient id="robe-as" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1040"/>
      <stop offset="100%" stop-color="#0D0820"/>
    </linearGradient>
    <linearGradient id="prism-as" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="64" height="64" fill="url(#bg-as)"/>
  <!-- dual-glow border: gold outer, cyan inner -->
  <rect x="1" y="1" width="62" height="62" fill="none" stroke="#C9A227" stroke-width="2" rx="3"/>
  <rect x="3" y="3" width="58" height="58" fill="none" stroke="#00E5FF" stroke-width="1" rx="2"/>
  <!-- energy rays emanating from figure (background layer) -->
  <line x1="32" y1="8"  x2="32" y2="2"  stroke="#C9A227" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="8"  x2="22" y2="4"  stroke="#C9A227" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="8"  x2="42" y2="4"  stroke="#C9A227" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="8"  x2="14" y2="8"  stroke="#00E5FF" stroke-width="1" opacity="0.35"/>
  <line x1="32" y1="8"  x2="50" y2="8"  stroke="#00E5FF" stroke-width="1" opacity="0.35"/>
  <!-- prism / ascended sigil (central diamond) -->
  <polygon points="32,5 40,14 32,23 24,14" fill="url(#prism-as)" opacity="0.9"/>
  <polygon points="32,7 38,14 32,21 26,14" fill="#0D0820"/>
  <polygon points="32,9 36,14 32,19 28,14" fill="url(#prism-as)" opacity="0.5"/>
  <!-- inner eye -->
  <rect x="30" y="13" width="4" height="3" fill="#00E5FF"/>
  <!-- robed body -->
  <rect x="18" y="25" width="28" height="28" rx="2" fill="url(#robe-as)"/>
  <rect x="18" y="25" width="28" height="28" fill="none" stroke="#C9A227" stroke-width="1.5" rx="2"/>
  <!-- robe collar -->
  <polygon points="32,25 26,33 38,33" fill="#1A1040" stroke="#C9A227" stroke-width="0.5"/>
  <!-- chest glyph: architect mark -->
  <polygon points="32,33 35,39 41,39 36,43 38,49 32,45 26,49 28,43 23,39 29,39" fill="#C9A227" opacity="0.9"/>
  <!-- energy wings left -->
  <path d="M18 30 Q 6 26 4 38 Q 8 42 18 42" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.7"/>
  <path d="M18 32 Q 8 30 6 40" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.5"/>
  <!-- energy wings right -->
  <path d="M46 30 Q 58 26 60 38 Q 56 42 46 42" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.7"/>
  <path d="M46 32 Q 56 30 58 40" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.5"/>
  <!-- robe hem / feet -->
  <rect x="20" y="55" width="10" height="6" rx="1" fill="#0D0820" stroke="#C9A227" stroke-width="1"/>
  <rect x="34" y="55" width="10" height="6" rx="1" fill="#0D0820" stroke="#C9A227" stroke-width="1"/>
  <!-- foot glow -->
  <rect x="20" y="60" width="10" height="2" fill="#C9A227" opacity="0.6"/>
  <rect x="34" y="60" width="10" height="2" fill="#00E5FF" opacity="0.6"/>
  <!-- role glyph top-right -->
  <text x="59" y="11" text-anchor="middle" font-family="monospace" font-size="8" fill="#C9A227">🜂</text>
</svg>
