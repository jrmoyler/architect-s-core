<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="bg-j" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#061820"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </linearGradient>
    <linearGradient id="cross-j" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0099CC"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="64" height="64" fill="url(#bg-j)"/>
  <!-- cyan border -->
  <rect x="1" y="1" width="62" height="62" fill="none" stroke="#00E5FF" stroke-width="2" rx="3"/>
  <!-- subtle inner glow ring -->
  <rect x="3" y="3" width="58" height="58" fill="none" stroke="#00E5FF" stroke-width="0.5" rx="2" opacity="0.3"/>
  <!-- head -->
  <rect x="21" y="6" width="22" height="17" rx="2" fill="#162028"/>
  <rect x="23" y="8" width="18" height="13" fill="#7A9A8A"/>
  <!-- eyes -->
  <rect x="27" y="12" width="3" height="3" fill="#00E5FF"/>
  <rect x="34" y="12" width="3" height="3" fill="#00E5FF"/>
  <!-- medical coat -->
  <rect x="13" y="25" width="38" height="25" rx="2" fill="#0D2030"/>
  <rect x="13" y="25" width="38" height="25" fill="none" stroke="#00E5FF" stroke-width="1" rx="2"/>
  <!-- coat lapels -->
  <polygon points="32,25 22,35 30,35" fill="#0A2030"/>
  <polygon points="32,25 42,35 34,35" fill="#0A2030"/>
  <!-- helix cross (medical symbol) -->
  <!-- vertical bar -->
  <rect x="29" y="28" width="6" height="18" rx="1" fill="url(#cross-j)"/>
  <!-- horizontal bar -->
  <rect x="22" y="35" width="20" height="6" rx="1" fill="url(#cross-j)"/>
  <!-- helix dots on vertical bar -->
  <rect x="30" y="31" width="2" height="2" fill="#C9A227"/>
  <rect x="32" y="34" width="2" height="2" fill="#C9A227"/>
  <rect x="30" y="37" width="2" height="2" fill="#C9A227"/>
  <rect x="32" y="40" width="2" height="2" fill="#C9A227"/>
  <!-- legs -->
  <rect x="17" y="52" width="12" height="10" rx="1" fill="#0B1820"/>
  <rect x="35" y="52" width="12" height="10" rx="1" fill="#0B1820"/>
  <!-- shoe highlight -->
  <rect x="17" y="60" width="12" height="2" fill="#00E5FF"/>
  <rect x="35" y="60" width="12" height="2" fill="#00E5FF"/>
  <!-- role glyph top-right -->
  <text x="59" y="11" text-anchor="middle" font-family="monospace" font-size="8" fill="#00E5FF">✚</text>
</svg>
